    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Why do people bite their nails?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nail biting (onychophagia) is a body-focused repetitive behavior (BFRB) affecting up to 30% of adults. Common triggers include stress, anxiety, boredom, and deep focus states. The habit often develops in childhood and becomes automatic — happening without conscious awareness. Genetic predisposition, perfectionism, and OCD-spectrum tendencies are also linked risk factors."
          }
        },
        {
          "@type": "Question",
          "name": "What are the best remedies to stop nail biting?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Evidence-based nail biting remedies include: (1) Habit Reversal Training (HRT) — the gold standard CBT approach; (2) bitter-taste nail polishes like Mavala Stop or Orly No Bite; (3) awareness tools like real-time AI detection apps; (4) competing response training — replacing the bite with a different hand movement; (5) stress reduction through mindfulness. A combination approach works best for most people."
          }
        },
        {
          "@type": "Question",
          "name": "What is habit reversal training for nail biting?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Habit Reversal Training (HRT) is a cognitive-behavioral therapy technique proven effective for body-focused repetitive behaviors like onychophagia. It has three components: (1) Awareness training — learning to notice when and why you bite; (2) Competing response — substituting the bite with an incompatible action like clenching a fist or pressing fingertips to a table; (3) Social support — accountability partners to reinforce progress. Studies show HRT reduces nail biting frequency by 70-90% in consistent practitioners."
          }
        },
        {
          "@type": "Question",
          "name": "Is nail biting harmful?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — nail biting causes multiple health issues: dental damage (chipped teeth, jaw strain), nail infections (paronychia), transfer of pathogens from fingers to mouth, and permanent nail deformity with chronic biting. Psychologically, the visible damage can cause shame and social anxiety, which in turn triggers more biting — a self-reinforcing cycle."
          }
        },
        {
          "@type": "Question",
          "name": "Does the Nail Habit App send my camera feed to the internet?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. The Nail Habit App is a Mac desktop app that uses MediaPipe — Google's WebAssembly-based AI framework — running 100% on your device. Your camera feed is never uploaded, streamed, or stored anywhere outside your Mac. Detection happens locally on your CPU/GPU with zero network requests during operation. You can disconnect from the internet and the app works identically."
          }
        },
        {
          "@type": "Question",
          "name": "How effective is habit reversal training for nail biting?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Habit Reversal Training (HRT) is the most evidence-supported treatment for onychophagia. Clinical studies report 70–90% reductions in biting frequency among consistent practitioners. The key mechanism is awareness: most nail biters have no conscious awareness of the majority of their bites. Real-time AI detection creates the awareness trigger automatically, which is the hardest component to achieve through willpower alone."
          }
        }
      ]
    }
