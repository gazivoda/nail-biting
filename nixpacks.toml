# nixpacks.toml — used by Coolify when Build Pack is set to Nixpacks.
# Builds the frontend and starts the Express server.

[phases.setup]
nixPkgs = ["nodejs_22", "python3", "gnumake", "gcc"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["VITE_BUILD_TARGET=web npm run build:web"]

[start]
cmd = "node server.js"
