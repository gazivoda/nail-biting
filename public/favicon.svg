<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stop Biting Nails">

  <!-- Background -->
  <rect width="80" height="80" rx="17" fill="#1D5C38"/>

  <!-- Finger body (closed stadium shape, skin tone) -->
  <path d="M 28 55 L 28 37 A 12 12 0 0 1 52 37 L 52 55 A 12 12 0 0 1 28 55 Z"
        fill="#F5C5A0"/>

  <!-- Nail plate (top portion, light blue) -->
  <path d="M 28 37 A 12 12 0 0 1 52 37 L 52 45 C 48 49 32 49 28 45 Z"
        fill="#D8EAFB"/>

  <!-- Prohibition circle (white) -->
  <circle cx="40" cy="40" r="28" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="3.5"/>

  <!-- Diagonal slash (white) -->
  <line x1="20" y1="20" x2="60" y2="60"
        stroke="rgba(255,255,255,0.9)" stroke-width="3.5" stroke-linecap="round"/>

</svg>
